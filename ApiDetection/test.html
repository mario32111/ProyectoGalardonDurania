<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Probar API de Vacas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <div class="container">
        <h2>Subir Imagen YOLO</h2>
        
        <div class="file-upload-wrapper">
            <label for="imagenInput" class="file-upload-label">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                </svg>
                <span>Haz clic para seleccionar imagen</span>
            </label>
            <input type="file" id="imagenInput" accept="image/*" onchange="updateFileName()">
            <div id="fileName">Ningún archivo seleccionado</div>
        </div>
        
        <button onclick="subirImagen()" class="btn-submit" id="submitBtn">
            <span class="loading-spinner" id="spinner"></span>
            <span id="btnText">Enviar a la API</span>
        </button>

        <div id="resultado" class="result"></div>
    </div>

    <script>
      function updateFileName() {
        const input = document.getElementById("imagenInput");
        const fileNameDisplay = document.getElementById("fileName");
        if (input.files.length > 0) {
          fileNameDisplay.textContent = input.files[0].name;
          fileNameDisplay.style.color = "var(--primary-blue)";
          fileNameDisplay.style.fontWeight = "500";
        } else {
          fileNameDisplay.textContent = "Ningún archivo seleccionado";
          fileNameDisplay.style.color = "var(--text-muted)";
          fileNameDisplay.style.fontWeight = "normal";
        }
      }

      async function subirImagen() {
        const input = document.getElementById("imagenInput");
        const resultDiv = document.getElementById("resultado");
        const submitBtn = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btnText");

        if (input.files.length === 0) {
          alert("Por favor selecciona una imagen primero.");
          return;
        }

        const formData = new FormData();
        formData.append("imagen", input.files[0]);

        resultDiv.style.display = "block";
        resultDiv.textContent = "Procesando... esto puede tomar unos segundos.";

        // Estado de carga
        submitBtn.disabled = true;
        spinner.style.display = "inline-block";
        btnText.textContent = "Enviando...";

        try {
          // Cambia esta URL por la "Application URL" que te da Azure para 'api-detection'
          const response = await fetch(
            "https://detect.politepebble-de41f15a.westus.azurecontainerapps.io/predict",
            {
              method: "POST",
              body: formData,
            },
          );

          const data = await response.json();
          resultDiv.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          resultDiv.textContent = "Error de conexión: " + error.message;
        } finally {
          // Restaurar estado
          submitBtn.disabled = false;
          spinner.style.display = "none";
          btnText.textContent = "Enviar a la API";
        }
      }
    </script>
  </body>
</html>
