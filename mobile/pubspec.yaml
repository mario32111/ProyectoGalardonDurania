name: agro_control_pro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # --- AQUI ES DONDE DEBEN IR LAS LIBRERIAS ---
  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0       # El motor del mapa (Gratis)
  latlong2: ^0.9.0          # Para manejar coordenadas
  geolocator: ^13.0.0
  firebase_core: ^3.1.0     # <--- FALTA ESTA (El núcleo de Firebase)
  cloud_firestore: ^5.0.0   # <--- Y ESTA (La base de datos)
  http: ^1.2.0              # Para peticiones HTTP con streaming
  uuid: ^4.5.0              # Para generar session IDs únicos
  image_picker: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  http_parser: ^4.1.2
  firebase_auth: ^5.7.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  pdf: ^3.12.0
  printing: ^5.14.3
  excel: ^4.0.6
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Todo lo que estaba abajo (fonts, assets) va aquí, 
  # pero NO las dependencias.